<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QorIQ RCW Reader</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <header>
      <h1>QorIQ RCW Reader</h1>
      <p class="subtitle">Reset Configuration Word parser for NXP QorIQ processors</p>
    </header>

    <section class="controls">
      <div class="control-group">
        <label for="processor-select">Processor</label>
        <select id="processor-select">
          <!-- Populated by JS from list_processors() -->
        </select>
      </div>

      <div class="control-group">
        <label for="file-input">PBL Binary File</label>
        <div class="file-drop-zone" id="drop-zone">
          <input type="file" id="file-input" accept=".bin"/>
          <span class="drop-hint">Drop .bin file here or <label for="file-input" class="browse-link">browse</label></span>
        </div>
      </div>

      <div class="control-group">
        <label for="sysclk-input">SYSCLK (MHz)</label>
        <input type="number" id="sysclk-input" value="100" min="1" step="0.001"/>
      </div>

      <button id="parse-btn" disabled>Parse RCW</button>
    </section>

    <section id="error-banner" class="error-banner hidden"></section>

    <section id="frequencies" class="hidden">
      <div class="results-header">
        <h2>Derived Frequencies</h2>
        <span class="filename-tag" id="freq-sysclk-label"></span>
      </div>
      <div class="freq-groups" id="freq-groups"></div>
    </section>

    <section id="results" class="hidden">
      <div class="results-header">
        <h2>RCW Fields — <span id="results-processor"></span></h2>
        <span id="results-filename" class="filename-tag"></span>
        <span id="results-crc" class="crc-badge crc-none"></span>
      </div>
      <div class="table-wrapper">
        <table id="fields-table">
          <thead>
            <tr>
              <th>Field</th>
              <th>Description</th>
              <th>Bits</th>
              <th>Raw Value</th>
              <th>Meaning</th>
            </tr>
          </thead>
          <tbody id="fields-body"></tbody>
        </table>
      </div>
    </section>

    <section id="issues" class="hidden">
      <div class="results-header">
        <h2>Observed Issues</h2>
      </div>
      <ul id="issues-list" class="issues-list"></ul>
      <p id="issues-none" class="issues-none hidden">No issues detected.</p>
    </section>
  </div>

  <div id="serdes-tooltip" class="serdes-tooltip hidden"></div>

  <footer class="app-footer">
    <span>QorIQ RCW Reader <span id="app-version"></span></span>
    <span class="footer-sep">·</span>
    <a href="https://github.com/kivancgnlp/Freescale_QorIQ_RCW_Readback" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script type="module" src="index.js"></script>
</body>
</html>
